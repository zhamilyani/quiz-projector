<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Конструктор квизов</title>
  <link rel="stylesheet" href="/src/shared/styles-common.css">
  <link rel="stylesheet" href="/src/admin/admin.css">
</head>
<body>
  <header>
    <h1>Конструктор квизов</h1>
    <div class="header-actions">
      <select id="quiz-select"><option value="">— Новый квиз —</option></select>
      <button class="btn-primary" id="btn-save">Сохранить</button>
      <button class="btn-danger" id="btn-delete" style="display:none">Удалить</button>
      <button class="btn-secondary" id="btn-blanks">Бланки ответов</button>
    </div>
  </header>
  <main>
    <!-- AI Генератор -->
    <section class="generator">
      <div class="generator-header" id="gen-toggle">
        <span>&#9889; AI-генератор квиза</span>
        <span class="gen-arrow" id="gen-arrow">&#9660;</span>
      </div>
      <div class="generator-body" id="gen-body" style="display:none">
        <!-- Шаг 1: Категория -->
        <div class="gen-step" id="gen-step-1">
          <label class="gen-label">Выберите тип квиза</label>
          <div class="gen-categories" id="gen-categories"></div>
        </div>

        <!-- Шаг 2: Типы раундов -->
        <div class="gen-step" id="gen-step-2" style="display:none">
          <label class="gen-label">Выберите типы раундов <span class="gen-hint">(выбранная категория: <strong id="gen-cat-name"></strong>)</span></label>
          <div class="gen-round-types" id="gen-round-types"></div>
        </div>

        <!-- Шаг 3: Настройки -->
        <div class="gen-step" id="gen-step-3">
          <div class="gen-row">
            <div class="gen-field">
              <label for="gen-topic">Уточнение темы <span class="gen-hint">(необязательно)</span></label>
              <input type="text" id="gen-topic" placeholder="Например: хиты 2000-х, российские и зарубежные">
            </div>
          </div>
          <div class="gen-row">
            <div class="gen-field">
              <label for="gen-rounds">Раундов</label>
              <input type="number" id="gen-rounds" value="3" min="1" max="10">
            </div>
            <div class="gen-field">
              <label for="gen-questions">Вопросов в раунде</label>
              <input type="number" id="gen-questions" value="10" min="3" max="20">
            </div>
          </div>
        </div>

        <button class="btn-primary gen-btn" id="btn-generate">&#9889; Сгенерировать квиз</button>
        <div class="gen-status" id="gen-status"></div>
      </div>
    </section>

    <section class="quiz-meta">
      <input type="text" id="quiz-title" placeholder="Название квиза" class="full-width">
      <div class="meta-row">
        <label>Таймер по умолч.: <input type="number" id="default-timer" value="60" min="5" max="300"> сек</label>
        <label>Кол-во команд: <input type="number" id="team-count" value="8" min="1" max="30"></label>
      </div>
    </section>
    <section id="rounds-container"></section>
    <button class="btn-primary" id="btn-add-round">+ Добавить раунд</button>
  </main>
  <script type="module" src="/src/admin/admin.js"></script>
</body>
</html>
