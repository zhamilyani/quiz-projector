<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Projector</title>
  <link rel="stylesheet" href="/src/shared/styles-common.css">
  <style>
    body { background: linear-gradient(135deg, var(--bg-dark), var(--bg-darker)); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .landing { text-align: center; max-width: 500px; }
    h1 { font-size: 2.5rem; color: var(--accent); margin-bottom: 0.5rem; }
    .subtitle { color: var(--text-muted); margin-bottom: 2rem; font-size: 1.1rem; }
    .links { display: flex; flex-direction: column; gap: 1rem; }
    .links a { display: block; padding: 1.2rem; background: var(--surface); border-radius: var(--radius); color: var(--text); text-decoration: none; font-size: 1.2rem; transition: all 0.2s; box-shadow: var(--shadow); }
    .links a:hover { background: var(--surface-light); transform: translateY(-2px); }
    .links a span { display: block; font-size: 0.85rem; color: var(--text-muted); margin-top: 0.3rem; }
  </style>
</head>
<body>
  <div class="landing">
    <h1>Quiz Projector</h1>
    <p class="subtitle">Конструктор квизов + проектор для pub quiz</p>
    <div class="links">
      <a href="/admin/">Конструктор квизов<span>Создание и редактирование квизов, загрузка медиа</span></a>
      <a href="/host/">Панель ведущего<span>Управление игрой, таймер, очки команд</span></a>
      <a href="/projector/">Экран проектора<span>Полноэкранное отображение для аудитории</span></a>
    </div>
  </div>
</body>
</html>
